# Render Blueprint — Pawliz backend (Express API + Socket.IO)
# Frontend deploys on Vercel, DB on Supabase, files on Cloudflare R2.
# Docs: https://render.com/docs/blueprint-spec
services:
  - type: web
    name: pawliz-backend
    runtime: node
    region: singapore        # closest Render region to Bangladesh
    plan: free               # $0; sleeps after 15min idle (cold start ~30s, Socket.IO drops while asleep)
    rootDir: backend
    # npm install includes devDependencies (typescript) needed for tsc build.
    buildCommand: npm install && npm run build
    # Migrations run from compiled output (dist/migrate.js -> dist/migrations).
    startCommand: npm run migrate:prod && node dist/server.js
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: JWT_EXPIRES_IN
        value: 15m
      # --- Secrets: set in Render dashboard, do NOT commit values ---
      - key: JWT_SECRET
        sync: false          # generate: node -e "console.log(require('crypto').randomBytes(32).toString('hex'))"
      - key: DATABASE_URL
        sync: false          # Supabase SESSION pooler / direct URL (port 5432) — required:
                             # node-pg-migrate uses advisory locks + prepared statements
                             # which break on the transaction pooler (6543).
      - key: DB_POOL_MAX
        value: 10            # Supabase free pooler cap is low
      - key: FRONTEND_URL
        sync: false          # Vercel URL — drives CORS + Socket.IO origins
      - key: APP_URL
        sync: false          # this Render service URL (CSP report-uri)
      # --- Cloudflare R2 (file storage; Render disk is ephemeral) ---
      - key: R2_ACCOUNT_ID
        sync: false
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false
      - key: R2_BUCKET_NAME
        sync: false          # PUBLIC bucket
      - key: R2_PRIVATE_BUCKET
        sync: false          # PRIVATE bucket (no public access — vet docs)
      - key: R2_PUBLIC_URL
        sync: false          # https://pub-xxx.r2.dev
      # --- SMS (onecodesoft) ---
      - key: SMS_API_KEY
        sync: false
      - key: SMS_SENDER_ID
        sync: false
